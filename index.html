<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shippea Fulfillment — Prototipo Completo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --orange:#E8572A; --orange-light:rgba(232,87,42,0.08); --orange-mid:rgba(232,87,42,0.15);
  --bg:#F4F3EF; --surface:#FFFFFF; --surface2:#F7F6F2;
  --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.14);
  --text:#1A1A18; --text2:#6B6A64; --text3:#A8A79F;
  --green:#3B6D11; --green-bg:#EAF3DE; --green-bd:#97C459;
  --blue:#185FA5; --blue-bg:#E6F1FB; --blue-bd:#85B7EB;
  --amber:#854F0B; --amber-bg:#FAEEDA; --amber-bd:#EF9F27;
  --red:#A32D2D; --red-bg:#FCEBEB; --red-bd:#F09595;
  --purple:#534AB7; --purple-bg:#EEEDFE; --purple-bd:#AFA9EC;
  --teal:#0F6E56; --teal-bg:#E1F5EE; --teal-bd:#5DCAA5;
  --r:10px; --r-sm:6px;
  --font:'DM Sans',system-ui,sans-serif; --mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;}

/* MODE SWITCHER */
.mode-bar{background:var(--text);padding:8px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.mode-label{font-size:11px;color:rgba(255,255,255,0.4);font-weight:500;letter-spacing:0.06em;text-transform:uppercase;}
.mode-btn{font-size:12px;padding:4px 12px;border-radius:4px;border:1px solid rgba(255,255,255,0.15);background:none;color:rgba(255,255,255,0.5);cursor:pointer;transition:all 0.15s;}
.mode-btn.active{background:var(--orange);border-color:var(--orange);color:white;font-weight:500;}
.mode-spacer{flex:1;}
.mode-info{font-size:11px;color:rgba(255,255,255,0.3);}

/* APP LAYOUT */
.app{display:flex;height:calc(100vh - 37px);overflow:hidden;}
.sidebar{width:196px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;}
.sb-top{padding:16px 14px 12px;border-bottom:1px solid var(--border);}
.sb-logo{display:flex;align-items:center;gap:8px;}
.sb-logo-mark{width:24px;height:24px;background:var(--orange);border-radius:5px;}
.sb-logo-name{font-size:15px;font-weight:600;color:var(--text);}
.sb-body{flex:1;padding:8px;}
.sb-section{margin-bottom:18px;}
.sb-section-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:0.07em;text-transform:uppercase;padding:0 6px;margin-bottom:3px;}
.sb-section-label.ful{color:var(--orange);}
.sb-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);padding:6px 8px;border-radius:var(--r-sm);cursor:pointer;transition:all 0.12s;margin-bottom:1px;}
.sb-item:hover{background:var(--surface2);color:var(--text);}
.sb-item.active{background:var(--orange-light);color:var(--orange);font-weight:500;}
.sb-item .dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;}
.sb-badge{font-size:10px;background:var(--orange);color:white;padding:1px 5px;border-radius:8px;margin-left:auto;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 22px;display:flex;align-items:center;gap:8px;flex-shrink:0;min-height:50px;}
.crumb{font-size:12px;color:var(--text2);cursor:pointer;}
.crumb:hover{color:var(--text);}
.crumb-sep{font-size:12px;color:var(--text3);}
.crumb-active{font-size:12px;font-weight:500;color:var(--text);}
.topbar-spacer{flex:1;}
.tb-wallet{font-size:12px;color:var(--text2);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--orange-light);color:var(--orange);font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;}
.page-content{flex:1;overflow-y:auto;padding:20px 22px;}

/* PAGES */
.page{display:none;}
.page.active{display:block;}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;gap:12px;}
.page-title{font-size:19px;font-weight:700;color:var(--text);letter-spacing:-0.3px;}
.page-sub{font-size:12px;color:var(--text2);margin-top:3px;}
.page-actions{display:flex;gap:8px;flex-shrink:0;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;padding:7px 13px;border-radius:var(--r-sm);cursor:pointer;border:none;transition:all 0.12s;font-family:var(--font);}
.btn-primary{background:var(--orange);color:white;}
.btn-primary:hover{background:#cc4a22;}
.btn-secondary{background:var(--surface);color:var(--text2);border:1px solid var(--border2);}
.btn-secondary:hover{background:var(--surface2);color:var(--text);}
.btn-sm{font-size:11px;padding:5px 9px;}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd);}
.btn-success{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd);}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);}
.card-header{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;}
.card-title{font-size:13px;font-weight:600;color:var(--text);}
.card-sub{font-size:11px;color:var(--text3);}
.card-body{padding:14px 16px;}

/* STATS */
.stat-grid{display:grid;gap:10px;}
.stat-grid-4{grid-template-columns:repeat(4,minmax(0,1fr));}
.stat-grid-5{grid-template-columns:repeat(5,minmax(0,1fr));}
.stat-grid-3{grid-template-columns:repeat(3,minmax(0,1fr));}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;}
.stat-label{font-size:10px;color:var(--text2);margin-bottom:4px;}
.stat-value{font-size:20px;font-weight:600;color:var(--text);}
.stat-sub{font-size:10px;color:var(--text3);margin-top:3px;}

/* BADGES */
.badge{display:inline-block;font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;}
.badge-ok{background:var(--green-bg);color:var(--green);}
.badge-low{background:var(--amber-bg);color:var(--amber);}
.badge-err{background:var(--red-bg);color:var(--red);}
.badge-blue{background:var(--blue-bg);color:var(--blue);}
.badge-purple{background:var(--purple-bg);color:var(--purple);}
.badge-teal{background:var(--teal-bg);color:var(--teal);}
.badge-gray{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.merchant-tag{font-size:11px;color:var(--blue);background:var(--blue-bg);padding:2px 7px;border-radius:8px;display:inline-block;}

/* TABLE */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{text-align:left;font-size:10px;color:var(--text3);font-weight:600;padding:8px 14px;border-bottom:1px solid var(--border);letter-spacing:0.04em;text-transform:uppercase;background:var(--surface);}
td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#FAFAF7;}

/* PROGRESS */
.prog-bar{height:4px;background:var(--border);border-radius:2px;}
.prog-fill{height:4px;border-radius:2px;}

/* TABS */
.tab-row{display:flex;border-bottom:1px solid var(--border);padding:0 16px;margin-bottom:0;}
.tab{font-size:12px;color:var(--text2);padding:8px 10px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--orange);border-bottom-color:var(--orange);font-weight:500;}

/* FORMS */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-group.full{grid-column:1/-1;}
.form-label{font-size:11px;font-weight:500;color:var(--text2);}
.form-label span{color:var(--orange);}
.form-input,.form-select{font-size:12px;color:var(--text);background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-sm);padding:7px 9px;width:100%;font-family:var(--font);}
.form-input:focus,.form-select:focus{outline:none;border-color:var(--orange);}
.form-textarea{font-size:12px;color:var(--text);background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-sm);padding:7px 9px;width:100%;resize:none;height:64px;font-family:var(--font);}

/* ALERTS */
.alert{padding:9px 12px;border-radius:var(--r-sm);font-size:12px;display:flex;gap:7px;align-items:flex-start;line-height:1.5;}
.alert-warn{background:var(--amber-bg);border:1px solid var(--amber-bd);color:#633806;}
.alert-info{background:var(--blue-bg);border:1px solid var(--blue-bd);color:#0C447C;}
.alert-ok{background:var(--green-bg);border:1px solid var(--green-bd);color:var(--green);}
.alert-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:3px;background:currentColor;}

/* LAYOUT HELPERS */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.col-2-1{display:grid;grid-template-columns:2fr 1fr;gap:14px;}
.col-1-2{display:grid;grid-template-columns:1fr 2fr;gap:14px;}
.flex-col{display:flex;flex-direction:column;gap:12px;}
.info-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;}
.info-row:last-child{border-bottom:none;}
.info-label{color:var(--text2);}
.info-value{font-weight:500;}
.section-title{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:7px;}
.spacer{height:14px;}

/* FILTER ROW */
.filter-row{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--border);}
.search-box{flex:1;display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:6px 9px;gap:5px;max-width:260px;}
.search-box input{background:none;border:none;outline:none;font-size:12px;color:var(--text);width:100%;font-family:var(--font);}
.filter-select{font-size:12px;color:var(--text2);background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-sm);padding:6px 9px;font-family:var(--font);}

/* FOOTER BAR */
.footer-bar{background:var(--surface);border-top:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.footer-hint{font-size:11px;color:var(--text3);}

/* SPLIT LAYOUT */
.split-layout{display:flex;flex:1;overflow:hidden;}
.split-left{width:340px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.split-right{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.split-body{flex:1;overflow-y:auto;}

/* ORDER / LIST ITEMS */
.list-item{padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.1s;}
.list-item:hover{background:var(--surface2);}
.list-item.selected{background:var(--orange-light);border-left:2px solid var(--orange);padding-left:12px;}
.item-num{font-size:13px;font-weight:600;color:var(--orange);}
.item-meta{font-size:11px;color:var(--text2);margin-top:2px;}
.item-foot{display:flex;align-items:center;justify-content:space-between;margin-top:4px;font-size:11px;color:var(--text3);}

/* TIMELINE */
.tl-item{display:flex;gap:10px;padding:7px 0;}
.tl-wrap{display:flex;flex-direction:column;align-items:center;}
.tl-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.tl-line{width:1px;flex:1;margin:4px 0;min-height:12px;}
.tl-title{font-size:12px;font-weight:500;color:var(--text);}
.tl-title.muted{color:var(--text3);font-weight:400;}
.tl-time{font-size:10px;color:var(--text3);margin-top:1px;}

/* PICK ITEM */
.pick-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);}
.pick-check{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.pick-check.done{background:var(--orange);border-color:var(--orange);}
.pick-check.done::after{content:'';width:5px;height:9px;border:2px solid white;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px);display:block;}
.pick-name{font-size:12px;font-weight:500;flex:1;}
.pick-name.done{text-decoration:line-through;color:var(--text3);}
.loc-pill{font-size:10px;font-family:var(--mono);background:var(--orange-light);color:var(--orange);padding:2px 6px;border-radius:4px;}

/* SERVICE ROW */
.svc-row{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--border);}
.svc-row:last-child{border-bottom:none;}
.svc-icon{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.svc-name{font-size:12px;font-weight:500;flex:1;}
.svc-unit{font-size:10px;color:var(--text3);margin-top:1px;}
.toggle{width:32px;height:18px;background:var(--border2);border-radius:9px;position:relative;cursor:pointer;transition:background 0.2s;flex-shrink:0;}
.toggle.on{background:var(--orange);}
.toggle-knob{width:12px;height:12px;background:white;border-radius:50%;position:absolute;top:3px;left:3px;transition:left 0.2s;}
.toggle.on .toggle-knob{left:17px;}
.rate-input{font-size:12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:5px 8px;width:80px;color:var(--text);text-align:right;font-family:var(--font);}
.rate-input:focus{outline:none;border-color:var(--orange);}

/* EMPLOYEE */
.emp-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;display:flex;gap:12px;align-items:flex-start;}
.emp-avatar{width:38px;height:38px;border-radius:50%;background:var(--orange-light);color:var(--orange);font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.emp-name{font-size:13px;font-weight:600;}
.emp-role{font-size:11px;color:var(--text2);margin-top:2px;}
.emp-stats{display:flex;gap:10px;margin-top:8px;}
.emp-stat{font-size:11px;color:var(--text2);background:var(--surface2);padding:3px 8px;border-radius:4px;}

/* RETURN ITEM */
.return-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 16px;margin-bottom:8px;cursor:pointer;transition:border-color 0.15s;}
.return-card:hover{border-color:var(--border2);}
.return-card.selected{border-color:var(--orange);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);width:480px;max-width:95vw;max-height:88vh;overflow-y:auto;transform:translateY(8px);transition:transform 0.2s;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;}
.modal-title{font-size:14px;font-weight:600;}
.modal-sub{font-size:11px;color:var(--text2);margin-top:2px;}
.modal-close{font-size:18px;color:var(--text3);background:none;border:none;cursor:pointer;}
.modal-body{padding:16px 18px;display:flex;flex-direction:column;gap:14px;}
.modal-footer{padding:10px 18px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
</style>
</head>
<body>

<!-- MODE BAR -->
<div class="mode-bar">
  <span class="mode-label">Vista:</span>
  <button class="mode-btn active" onclick="setMode('admin',this)">Admin Shippea</button>
  <button class="mode-btn" onclick="setMode('merchant',this)">Portal Merchant</button>
  <div class="mode-spacer"></div>
  <span class="mode-info">Shippea Fulfillment · Prototipo v1 · Abril 2026</span>
</div>

<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sb-top">
      <div class="sb-logo">
        <div class="sb-logo-mark"></div>
        <span class="sb-logo-name">Shippea</span>
      </div>
    </div>
    <div class="sb-body" id="sb-body"></div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div id="breadcrumb" style="display:flex;align-items:center;gap:6px;font-size:12px;"></div>
      <div class="topbar-spacer"></div>
      <div class="tb-wallet" id="tb-wallet">💳 $4,967.12</div>
      <div class="avatar" id="tb-avatar">AD</div>
    </div>
    <div class="page-content" id="page-content"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div><div class="modal-title" id="modal-title"></div><div class="modal-sub" id="modal-sub"></div></div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────
const ADMIN_PAGES = {
  dashboard: { label:'Dashboard', group:'main' },
  inbound: { label:'Inbound', group:'fulfillment' },
  inventario: { label:'Inventario', group:'fulfillment' },
  ubicaciones: { label:'Ubicaciones', group:'fulfillment' },
  pickpack: { label:'Pick & Pack', group:'fulfillment' },
  tarifario: { label:'Tarifario', group:'fulfillment' },
  facturacion: { label:'Facturación', group:'fulfillment' },
  empleados: { label:'Empleados', group:'operacion' },
  devoluciones: { label:'Devoluciones', group:'operacion' },
  reportes: { label:'Reportes', group:'operacion' },
};
const MERCHANT_PAGES = {
  m_dashboard: { label:'Dashboard', group:'fulfillment' },
  m_inventario: { label:'Mi inventario', group:'fulfillment' },
  m_ordenes: { label:'Mis órdenes', group:'fulfillment' },
  m_inbound: { label:'Enviar stock', group:'fulfillment' },
  m_reportes: { label:'Reportes', group:'fulfillment' },
};
const SB_GROUPS = {
  admin: { main:'Main', fulfillment:'Fulfillment', operacion:'Operación' },
  merchant: { fulfillment:'Mi fulfillment' },
};

let currentMode = 'admin';
let currentPage = 'dashboard';

// ── SETUP ─────────────────────────────────────────────────
function setMode(mode, btn) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tb-wallet').style.display = mode==='merchant' ? 'flex' : 'flex';
  document.getElementById('tb-wallet').textContent = mode==='merchant' ? '💳 $10.00' : '💳 $4,967.12';
  document.getElementById('tb-avatar').textContent = mode==='merchant' ? 'CS' : 'AD';
  const firstPage = mode==='admin' ? 'dashboard' : 'm_dashboard';
  buildSidebar(mode);
  goTo(firstPage);
}

function buildSidebar(mode) {
  const pages = mode==='admin' ? ADMIN_PAGES : MERCHANT_PAGES;
  const groups = SB_GROUPS[mode];
  const sb = document.getElementById('sb-body');
  sb.innerHTML = '';
  const grouped = {};
  Object.entries(pages).forEach(([id,p]) => {
    if(!grouped[p.group]) grouped[p.group]=[];
    grouped[p.group].push({id,...p});
  });
  Object.entries(grouped).forEach(([gKey, items]) => {
    const sec = document.createElement('div');
    sec.className = 'sb-section';
    const isFul = gKey==='fulfillment';
    sec.innerHTML = `<div class="sb-section-label ${isFul?'ful':''}">${groups[gKey]||gKey}</div>`;
    items.forEach(item => {
      const el = document.createElement('div');
      el.className = 'sb-item';
      el.id = 'sb-'+item.id;
      el.innerHTML = `<div class="dot"></div>${item.label}`;
      if(item.id==='inbound') el.innerHTML += `<span class="sb-badge">4</span>`;
      if(item.id==='pickpack') el.innerHTML += `<span class="sb-badge">5</span>`;
      if(item.id==='devoluciones') el.innerHTML += `<span class="sb-badge">2</span>`;
      el.onclick = () => goTo(item.id);
      sec.appendChild(el);
    });
    sb.appendChild(sec);
  });
}

function goTo(page) {
  currentPage = page;
  document.querySelectorAll('.sb-item').forEach(s=>s.classList.remove('active'));
  const sbEl = document.getElementById('sb-'+page);
  if(sbEl) sbEl.classList.add('active');
  const pages = currentMode==='admin' ? ADMIN_PAGES : MERCHANT_PAGES;
  const pageData = pages[page];
  const bc = document.getElementById('breadcrumb');
  if(pageData) {
    bc.innerHTML = `<span class="crumb" onclick="goTo('${currentMode==='admin'?'dashboard':'m_dashboard'}')">Fulfillment</span><span class="crumb-sep">›</span><span class="crumb-active">${pageData.label}</span>`;
  }
  const pc = document.getElementById('page-content');
  pc.innerHTML = renderPage(page);
  attachHandlers(page);
}

// ── PAGE RENDERERS ────────────────────────────────────────
function renderPage(page) {
  switch(page) {
    case 'dashboard': return renderAdminDashboard();
    case 'inbound': return renderInbound();
    case 'inventario': return renderInventario();
    case 'ubicaciones': return renderUbicaciones();
    case 'pickpack': return renderPickPack();
    case 'tarifario': return renderTarifario();
    case 'facturacion': return renderFacturacion();
    case 'empleados': return renderEmpleados();
    case 'devoluciones': return renderDevoluciones();
    case 'reportes': return renderReportes();
    case 'm_dashboard': return renderMerchantDashboard();
    case 'm_inventario': return renderMerchantInventario();
    case 'm_ordenes': return renderMerchantOrdenes();
    case 'm_inbound': return renderMerchantInbound();
    case 'm_reportes': return renderMerchantReportes();
    default: return `<div style="padding:40px;text-align:center;color:var(--text3);">Página en construcción</div>`;
  }
}

async function resolveReturn(id, status) {
  const { error } = await db.from('returns').update({ status, inspected_at: new Date().toISOString() }).eq('id', id);
  if (!error) await loadInitialData();
}

        <button class="btn btn-primary" onclick="submitEmployee()">Crear empleado</button>

// ── FORM SUBMISSIONS ──────────────────────────────────────
async function submitInbound() {
  const merchantId = document.getElementById('ib-merchant')?.value;
  const date = document.getElementById('ib-date')?.value;
  const method = document.getElementById('ib-method')?.value;
  const notes = document.getElementById('ib-notes')?.value;
  const msg = document.getElementById('ib-msg');
  if (!merchantId) { msg.innerHTML = '<div class="alert alert-warn"><div class="alert-dot"></div>Selecciona un merchant</div>'; return; }
  msg.innerHTML = '<div style="color:var(--text2);font-size:12px;">Guardando...</div>';
  try {
    await createInbound(merchantId, date, method, notes);
    closeModal();
    goTo('inbound');
  } catch(e) {
    msg.innerHTML = `<div class="alert alert-warn"><div class="alert-dot"></div>Error: ${e.message}</div>`;
  }
}

async function submitEmployee() {
  const name = document.getElementById('emp-name')?.value;
  const email = document.getElementById('emp-email')?.value;
  const role = document.getElementById('emp-role')?.value;
  const shift = document.getElementById('emp-shift')?.value;
  const msg = document.getElementById('emp-msg');
  if (!name || !email) { msg.innerHTML = '<div class="alert alert-warn"><div class="alert-dot"></div>Nombre y email son requeridos</div>'; return; }
  msg.innerHTML = '<div style="color:var(--text2);font-size:12px;">Guardando...</div>';
  try {
    await createEmployee(name, email, role, shift);
    closeModal();
    goTo('empleados');
  } catch(e) {
    msg.innerHTML = `<div class="alert alert-warn"><div class="alert-dot"></div>Error: ${e.message}</div>`;
  }
}

async function submitReturn() {
  const merchantId = document.getElementById('ret-merchant')?.value;
  const reason = document.getElementById('ret-reason')?.value;
  const notes = document.getElementById('ret-notes')?.value;
  const msg = document.getElementById('ret-msg');
  msg.innerHTML = '<div style="color:var(--text2);font-size:12px;">Guardando...</div>';
  try {
    await createReturn(null, merchantId, reason, notes);
    closeModal();
    goTo('devoluciones');
  } catch(e) {
    msg.innerHTML = `<div class="alert alert-warn"><div class="alert-dot"></div>Error: ${e.message}</div>`;
  }
}

async function submitMerchant() {
  const name = document.getElementById('mer-name')?.value;
  const email = document.getElementById('mer-email')?.value;
  const phone = document.getElementById('mer-phone')?.value;
  const msg = document.getElementById('mer-msg');
  if (!name || !email) { msg.innerHTML = '<div class="alert alert-warn"><div class="alert-dot"></div>Nombre y email son requeridos</div>'; return; }
  msg.innerHTML = '<div style="color:var(--text2);font-size:12px;">Guardando...</div>';
  try {
    await createMerchant(name, email, phone);
    closeModal();
    goTo('dashboard');
  } catch(e) {
    msg.innerHTML = `<div class="alert alert-warn"><div class="alert-dot"></div>Error: ${e.message}</div>`;
  }
}
